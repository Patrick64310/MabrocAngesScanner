
name: Build MabrocAngesScanner V6 Stable

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build
        working-directory: ScannerEtsy
        run: dotnet build -c Release

      - name: Publish EXE
        uses: actions/upload-artifact@v4
        with:
          name: MabrocAngesScanner
          path: ScannerEtsy/bin/Release/**/*.exe
