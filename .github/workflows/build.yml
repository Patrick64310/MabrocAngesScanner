
name: Build MabrocAngesScanner V6 Stable

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'


      - name: Publish Self-Contained EXE
        working-directory: ScannerEtsy
        run: dotnet publish -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true /p:IncludeNativeLibrariesForSelfExtract=true /p:EnableCompressionInSingleFile=true


      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: MabrocAngesScanner
          path: ScannerEtsy/bin/Release/net8.0-windows/win-x64/publish/*.exe
