name: Build MabrocAngesScanner

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore
      working-directory: ScannerEtsy
      run: dotnet restore

    - name: Build
      working-directory: ScannerEtsy
      run: dotnet build -c Release

    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: MabrocAngesScanner
        path: ScannerEtsy/bin/Release/**/*.exe

